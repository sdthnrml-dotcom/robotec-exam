<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-card { background: #1e1e1e; border-radius: 12px; padding: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3; }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; }
        .header-info h1 { margin: 5px 0 0 0; color: #fff; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { padding: 10px; border-radius: 8px; border: 2px solid #333; background: #2c2c2e; color: #fff; width: 140px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-pdf { background: #2196f3; color: white; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        .stat-card, .chart-card, .table-card { background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }
        th { background: #2c2c2e; color: #ccc; }
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; color: white; }
        .btn-clear { background: #3a1c1c; color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-card">
        <div class="header-info"><h2>Faculty Of Languages And Technology</h2><h1>Robotec Dashboard</h1></div>
        <div class="controls">
            <input type="text" id="branchInput" class="meta-input" placeholder="Branch Name">
            <input type="text" id="groupInput" class="meta-input" placeholder="Group No">
            <button id="toggleBtn" class="btn btn-start" onclick="toggleExam()">Loading...</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>
    <div class="dashboard-grid">
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="stat-card"><h3>Live Students</h3><span id="loginCount">0</span></div>
            <div class="chart-card"><canvas id="gradeChart"></canvas></div>
        </div>
        <div class="table-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Results</h3><button class="btn-clear" onclick="clearAllData()">Clear All</button>
            </div>
            <div id="pdf-area">
                <table id="resultsTable">
                    <thead><tr><th>ID</th><th>Name</th><th>Marks</th><th>Grade</th><th>Action</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:36e9055b16af141292e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gradeChart = null;

    function toggleExam() {
        db.ref('status').once('value', s => {
            const curr = s.val() || 'stopped';
            if(curr === 'stopped') {
                const b = document.getElementById('branchInput').value.trim(), g = document.getElementById('groupInput').value.trim();
                if(!b || !g) return alert("Enter Branch and Group!");
                db.ref().update({ status: 'running', branch: b, group: g, session: Date.now(), active: null });
            } else { db.ref('status').set('stopped'); }
        });
    }

    function clearAllData() { if(confirm("Delete all data?")) db.ref().update({ results: null, active: null }); }

    db.ref().on('value', snap => {
        const data = snap.val() || {}, status = data.status || 'stopped', btn = document.getElementById('toggleBtn');
        btn.innerText = status === 'running' ? "STOP EXAM" : "START EXAM";
        btn.className = status === 'running' ? "btn btn-stop" : "btn btn-start";
        document.getElementById('loginCount').innerText = data.active ? Object.keys(data.active).length : 0;
        const results = data.results ? Object.values(data.results) : [], tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const counts = { "A":0,"B":0,"C":0,"F":0,"VOID":0 };
        results.forEach(r => {
            counts[r.grade]++;
            tbody.innerHTML += `<tr><td>${r.id}</td><td>${r.name} ${r.violation?'⚠️':''}</td><td>${r.marks}</td>
                <td><span class="grade-pill" style="background:${getGradeColor(r.grade)}">${r.grade}</span></td>
                <td><button onclick="db.ref('results/${r.id}').remove()">X</button></td></tr>`;
        });
        updateChart(counts);
    });

    function getGradeColor(g) { return { "A":"#4caf50","B":"#8bc34a","C":"#ff9800","F":"#f44336","VOID":"#d32f2f" }[g] || "#444"; }

    function updateChart(c) {
        const ctx = document.getElementById('gradeChart').getContext('2d');
        if(gradeChart) gradeChart.destroy();
        gradeChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(c), datasets: [{ data: Object.values(c), backgroundColor: '#2196f3' }] }, options: { plugins: { legend: { display: false } } } });
    }

    function downloadPDF() {
        const el = document.getElementById('pdf-area');
        html2pdf().from(el).save('Robotec_Results.pdf');
    }
</script>
</body>
</html>
