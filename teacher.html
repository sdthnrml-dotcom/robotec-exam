<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- DARK THEME BASE --- */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Cards */
        .header-card, .chart-card, .table-card, .stat-card { 
            background: #1e1e1e; border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
        }
        
        .header-card { 
            padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center;
            margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3;
        }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; font-weight: bold; line-height: 1.2; }
        .header-info h1 { margin: 5px 0 0 0; color: #ffffff; font-size: 1.4rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* Input Controls */
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { 
            padding: 10px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; 
            outline: none; width: 140px; transition: 0.2s; text-align: center; box-sizing: border-box;
            background-color: #2c2c2e; color: #fff;
        }
        .meta-input:focus { border-color: #2196f3; }
        .meta-input:disabled { background-color: #1a1a1a; color: #666; cursor: not-allowed; border-color: #222; }
        
        /* Buttons */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; opacity: 1; }
        .btn-pdf { background: #2196f3; color: white; }
        .btn-pdf:hover { background: #1976d2; }
        
        /* Dashboard Layout */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; margin-bottom: 25px; }
        .left-column { display: flex; flex-direction: column; gap: 20px; }
        .chart-card, .table-card { padding: 20px; }
        
        .stat-card { text-align: center; padding: 25px 20px; }
        .stat-card h3 { margin: 0; color: #aaa; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; margin-top: 10px; line-height: 1; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; vertical-align: middle; }
        th { background-color: #2c2c2e; color: #ccc; font-weight: bold; text-align: center; }
        td { text-align: center; color: #eee; }
        td:nth-child(2) { text-align: left; } 
        tr:hover { background-color: #252525; }
        
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; color: white; display: inline-block; text-align: center; min-width: 30px; }
        
        /* Delete Button */
        .btn-clear { background: #3a1c1c; color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-clear:hover { background: #ff5252; color: white; }
        
        .cheat-badge { font-size: 1.2rem; margin-left: 8px; cursor: help; } 
        
        #pdf-content { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        
        /* Headers */
        h3 { color: #e0e0e0; }
        .report-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #2196f3; display: none; }
        .report-header h3 { margin: 0; color: #fff; font-size: 1.5rem; text-transform: uppercase; }
        .report-header p { margin: 5px 0 0 0; color: #aaa; font-size: 1.1rem; font-weight: bold; }

        /* --- MODAL BOX STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box {
            background: #1e1e1e; border: 1px solid #333; border-radius: 16px; padding: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-align: center;
            animation: gentleDrop 0.3s ease-out;
        }
        @keyframes gentleDrop {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .modal-box h3 { margin: 0 0 15px 0; color: #2196f3; font-size: 1.5rem; }
        .modal-box p { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.4; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-actions .btn { flex: 1; }
        .btn-cancel { background: #444; color: #eee; }
        .btn-cancel:hover { background: #555; }

        /* --- PRINT INK-SAVER MODE --- */
        .light-print { background: white !important; color: black !important; }
        .light-print th { background-color: #f8f9fa !important; color: #333 !important; border-bottom: 1px solid #ccc !important; }
        .light-print td { color: #000 !important; border-bottom: 1px solid #eee !important; }
        .light-print h3 { color: #000 !important; }
        .light-print p { color: #555 !important; }
    </style>
</head>
<body>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Notice</h3>
        <p id="modalMessage">Message goes here</p>
        <input type="password" id="modalInput" class="meta-input" style="display:none; width: 100%; margin-bottom: 15px;" placeholder="Enter Password">
        <div class="modal-actions">
            <button id="btnCancel" class="btn btn-cancel">Cancel</button>
            <button id="btnConfirm" class="btn btn-start">OK</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-card">
        <div class="header-info">
            <h2>Faculty Of Languages And Technology</h2>
            <h1>Robotec Teacher Dashboard</h1>
        </div>
        <div class="controls">
            <input type="text" id="branchInput" class="meta-input" placeholder="Branch Name" oninput="checkInputs()">
            <input type="text" id="groupInput" class="meta-input" placeholder="Group No" oninput="checkInputs()">
            <button id="toggleBtn" class="btn btn-start" onclick="toggleExam()" disabled>Fill Details to Start</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="stat-card">
                <h3>Live Students Logged In</h3>
                <span id="loginCount">0</span>
            </div>
            <div class="chart-card">
                <h3 style="margin-top: 0; text-align: center;">Grade Distribution</h3>
                <canvas id="gradeChart"></canvas>
            </div>
        </div>
        
        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">Student Results</h3>
                <button class="btn-clear" onclick="clearAllData()">Clear All Data</button>
            </div>
            
            <div id="pdf-content">
                <div class="report-header" id="reportHeader">
                    <h3>Exam Results Report</h3>
                    <p id="reportHeadlineText">Branch: --- | Group No: ---</p>
                </div>

                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Answered</th>
                            <th>Marks</th>
                            <th>Grade</th>
                            <th class="no-print">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:36e9055b16af141292e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let gradeChartInstance = null;
    const ADMIN_PASSWORD = "123";
    
    // Cloud Variables
    let currentStatus = 'stopped';
    let currentResults = [];
    let activeLogins = 0;

    // --- CUSTOM MODAL (UNCHANGED) ---
    function customBox(message, type = 'alert') {
        return new Promise((resolve) => {
            const modal = document.getElementById('customModal');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const input = document.getElementById('modalInput');
            const btnCancel = document.getElementById('btnCancel');
            const btnConfirm = document.getElementById('btnConfirm');

            msg.innerText = message;
            input.value = '';
            modal.style.display = 'flex';

            if (type === 'alert') {
                title.innerText = "Notice";
                title.style.color = "#2196f3";
                input.style.display = 'none';
                btnCancel.style.display = 'none';
                btnConfirm.innerText = "OK";
                btnConfirm.className = "btn btn-start";
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(true); };
            } 
            else if (type === 'confirm') {
                title.innerText = "Are you sure?";
                title.style.color = "#f44336";
                input.style.display = 'none';
                btnCancel.style.display = 'block';
                btnConfirm.innerText = "Yes, Proceed";
                btnConfirm.className = "btn btn-stop";
                btnCancel.onclick = () => { modal.style.display = 'none'; resolve(false); };
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(true); };
            } 
            else if (type === 'password') {
                title.innerText = "Security Check";
                title.style.color = "#ff9800";
                input.style.display = 'block';
                btnCancel.style.display = 'block';
                btnConfirm.innerText = "Submit";
                btnConfirm.className = "btn btn-start";
                input.focus();
                btnCancel.onclick = () => { modal.style.display = 'none'; resolve(null); };
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(input.value); };
            }
        });
    }

    // --- FIREBASE REALTIME LISTENERS ---
    db.ref('status').on('value', snap => {
        currentStatus = snap.val() || 'stopped';
        updateUI();
    });

    db.ref('settings').on('value', snap => {
        let settings = snap.val() || {};
        if (currentStatus === 'running') {
            document.getElementById('branchInput').value = settings.branch || '';
            document.getElementById('groupInput').value = settings.group || '';
        }
        updateUI();
    });

    db.ref('results').on('value', snap => {
        let data = snap.val() || {};
        currentResults = Object.values(data);
        updateUI();
    });

    db.ref('active_students').on('value', snap => {
        let data = snap.val() || {};
        activeLogins = Object.keys(data).length;
        document.getElementById('loginCount').innerText = activeLogins;
    });

    function checkInputs() {
        if (currentStatus === 'running') return; 
        
        let branch = document.getElementById('branchInput').value.trim();
        let group = document.getElementById('groupInput').value.trim();
        let btn = document.getElementById('toggleBtn');
        
        if (branch === "" || group === "") {
            btn.disabled = true;
            btn.innerText = "Fill Details to Start";
            btn.className = "btn btn-start";
        } else {
            btn.disabled = false;
            btn.innerText = "Start Exam";
            btn.className = "btn btn-start";
        }
    }

    window.onload = function() {
        updateUI();
    };

    function toggleExam() {
        if (currentStatus === 'stopped') {
            let branch = document.getElementById('branchInput').value.trim();
            let group = document.getElementById('groupInput').value.trim();
            
            db.ref('settings').set({ branch: branch, group: group });
            db.ref('status').set('running');
            db.ref('active_students').remove(); // Clear previous session logins
            
        } else {
            db.ref('status').set('stopped');
        }
    }

    async function deleteStudent(index) {
        let isSure = await customBox("You are about to delete this student's result.", "confirm");
        if (isSure) {
            let pass = await customBox("Please enter the admin password to delete:", "password");
            if (pass === ADMIN_PASSWORD) {
                let studentId = currentResults[index].id;
                db.ref('results/' + studentId).remove();
            } else if (pass !== null) {
                customBox("Incorrect password! Deletion blocked.", "alert");
            }
        }
    }

    async function clearAllData() {
        let isSure = await customBox("WARNING: This will delete ALL student results, logins, and clear the current branch/group.", "confirm");
        if (isSure) {
            let pass = await customBox("Please enter the admin password to clear all data:", "password");
            if (pass === ADMIN_PASSWORD) {
                db.ref('results').remove();
                db.ref('active_students').remove();
                db.ref('settings').remove();
                
                document.getElementById('branchInput').value = "";
                document.getElementById('groupInput').value = "";
                
                customBox("All data has been successfully cleared.", "alert");
            } else if (pass !== null) {
                customBox("Incorrect password! Action blocked.", "alert");
            }
        }
    }

    function updateUI() {
        let btn = document.getElementById('toggleBtn');
        let branchInp = document.getElementById('branchInput');
        let groupInp = document.getElementById('groupInput');

        if (currentStatus === 'running') {
            btn.disabled = false;
            btn.innerText = "Stop Exam";
            btn.className = "btn btn-stop";
            branchInp.disabled = true;
            groupInp.disabled = true;
        } else {
            branchInp.disabled = false;
            groupInp.disabled = false;
            checkInputs(); 
        }

        let reportHeader = document.getElementById('reportHeader');
        if (branchInp.value !== "" && groupInp.value !== "") {
            reportHeader.style.display = 'block';
            document.getElementById('reportHeadlineText').innerText = `Branch: ${branchInp.value}  |  Group No: ${groupInp.value}`;
        } else {
            reportHeader.style.display = 'none';
        }

        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (currentResults.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#666;">No results recorded yet.</td></tr>`;
        } else {
            currentResults.forEach((res, index) => {
                let color = "#f44336"; 
                if(res.grade === "A+" || res.grade === "A") color = "#4caf50";
                if(res.grade === "B") color = "#8bc34a";
                if(res.grade === "C") color = "#ff9800";
                if(res.grade === "S") color = "#ffeb3b";

                let cheatWarning = res.violation ? `<span class="cheat-badge" title="Warning: Student switched apps or lost focus during the exam.">🚨</span>` : '';

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${res.id}</strong></td>
                    <td>${res.name} ${cheatWarning}</td>
                    <td>${res.answered} / 14</td>
                    <td>${res.marks}</td>
                    <td><span class="grade-pill" style="background:${color}; color:${res.grade==="S"||res.grade==="C"?'#333':'white'}">${res.grade}</span></td>
                    <td class="no-print"><button class="btn-clear" onclick="deleteStudent(${index})">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }
        updateChart(currentResults);
    }

    function updateChart(results) {
        let counts = { "A+": 0, "A": 0, "B": 0, "C": 0, "S": 0, "F": 0, "VOID": 0 };
        results.forEach(r => { if(counts[r.grade] !== undefined) counts[r.grade]++; });

        const ctx = document.getElementById('gradeChart').getContext('2d');
        if (gradeChartInstance) gradeChartInstance.destroy();

        Chart.defaults.color = '#ccc';

        gradeChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A+', 'A', 'B', 'C', 'S', 'F', "VOID"],
                datasets: [{
                    label: 'Number of Students',
                    data: [counts['A+'], counts['A'], counts['B'], counts['C'], counts['S'], counts['F'], counts["VOID"]],
                    backgroundColor: ['#4caf50', '#4caf50', '#8bc34a', '#ff9800', '#ffeb3b', '#f44336', '#d32f2f'],
                    borderRadius: 5
                }]
            },
            options: { 
                responsive: true, 
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        ticks: { stepSize: 1 },
                        grid: { color: '#333' } 
                    },
                    x: {
                        grid: { color: '#333' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#ccc' } }
                }
            }
        });
    }

    function downloadPDF() {
        document.querySelectorAll('.no-print').forEach(el => el.style.display = 'none');
        let element = document.getElementById('pdf-content');
        
        // Temporarily add light-print class to save printer ink
        element.classList.add('light-print');
        
        let branchVal = document.getElementById('branchInput').value || 'Unknown_Branch';
        let groupVal = document.getElementById('groupInput').value || 'Unknown_Group';
        let fileName = `Robotec_Results_${branchVal}_${groupVal}.pdf`;

        let opt = {
            margin: 10, filename: fileName, image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save().then(() => {
            document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
            // Remove light-print class to return to dark mode on screen
            element.classList.remove('light-print');
        });
    }
</script>
</body>
</html>
