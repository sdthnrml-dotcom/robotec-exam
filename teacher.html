<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- DARK THEME BASE --- */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-card, .chart-card, .table-card, .stat-card { background: #1e1e1e; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .header-card { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3; }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; font-weight: bold; }
        .header-info h1 { margin: 5px 0 0 0; color: #ffffff; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { padding: 10px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; outline: none; width: 140px; text-align: center; background-color: #2c2c2e; color: #fff; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-pdf { background: #2196f3; color: white; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; margin-bottom: 25px; }
        .left-column { display: flex; flex-direction: column; gap: 20px; }
        .chart-card, .table-card { padding: 20px; }
        .stat-card { text-align: center; padding: 25px 20px; }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; text-align: center; }
        th { background-color: #2c2c2e; color: #ccc; }
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; color: white; display: inline-block; }
        .cheat-alert { color: #f44336; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .no-print-action { color: #666; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <div class="header-info">
            <h2>Faculty Of Languages And Technology</h2>
            <h1>Robotec Cloud Control Center</h1>
        </div>
        <div class="controls">
            <input type="text" id="branchInput" class="meta-input" placeholder="Branch Name">
            <input type="text" id="groupInput" class="meta-input" placeholder="Group No">
            <button id="toggleBtn" class="btn btn-start" onclick="toggleExam()">Start Exam</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="stat-card">
                <h3>Live Students</h3>
                <span id="loginCount">0</span>
            </div>
            <div class="chart-card">
                <canvas id="gradeChart"></canvas>
            </div>
        </div>
        
        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Real-Time Results</h3>
                <button style="background:transparent; color:#f44336; border:1px solid #f44336; padding:5px; border-radius:5px; cursor:pointer;" onclick="clearCloudData()">Reset Database</button>
            </div>
            <div id="pdf-content">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Marks</th>
                            <th>Grade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:36e9055b16af141292e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let gradeChartInstance = null;

    // --- LIVE LISTENERS ---
    
    // 1. Listen for Status (Running/Stopped)
    db.ref('status').on('value', (snap) => {
        const status = snap.val();
        const btn = document.getElementById('toggleBtn');
        if(status === 'running') {
            btn.innerText = "Stop Exam";
            btn.className = "btn btn-stop";
        } else {
            btn.innerText = "Start Exam";
            btn.className = "btn btn-start";
        }
    });

    // 2. Listen for Live Results
    db.ref('results').on('value', (snap) => {
        const data = snap.val();
        const tbody = document.getElementById('tableBody');
        const loginCount = document.getElementById('loginCount');
        
        tbody.innerHTML = '';
        let resultsArray = [];
        let count = 0;

        if(!data) {
            tbody.innerHTML = '<tr><td colspan="5">No students yet...</td></tr>';
            loginCount.innerText = "0";
            updateChart([]);
            return;
        }

        for(let id in data) {
            count++;
            let r = data[id];
            resultsArray.push(r);
            
            let gradeColor = r.grade === 'VOID' ? '#f44336' : '#4caf50';
            let statusText = r.cheated ? '<span class="cheat-alert">🚨 CHEATED</span>' : '<span style="color:#4caf50">✅ OK</span>';

            tbody.innerHTML += `
                <tr>
                    <td><b>${r.id}</b></td>
                    <td>${r.name}</td>
                    <td>${r.marks}</td>
                    <td><span class="grade-pill" style="background:${gradeColor}">${r.grade}</span></td>
                    <td>${statusText}</td>
                </tr>
            `;
        }
        loginCount.innerText = count;
        updateChart(resultsArray);
    });

    function toggleExam() {
        db.ref('status').once('value', (snap) => {
            const current = snap.val();
            const next = current === 'running' ? 'stopped' : 'running';
            db.ref('status').set(next);
        });
    }

    function clearCloudData() {
        if(confirm("Delete ALL results from the Cloud?")) {
            db.ref('results').remove();
        }
    }

    function updateChart(results) {
        let counts = { "A": 0, "B": 0, "C": 0, "W": 0, "VOID": 0 };
        results.forEach(r => { if(counts[r.grade] !== undefined) counts[r.grade]++; });

        const ctx = document.getElementById('gradeChart').getContext('2d');
        if (gradeChartInstance) gradeChartInstance.destroy();

        gradeChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A', 'B', 'C', 'W', 'VOID'],
                datasets: [{
                    label: 'Students',
                    data: [counts['A'], counts['B'], counts['C'], counts['W'], counts['VOID']],
                    backgroundColor: ['#4caf50', '#8bc34a', '#ff9800', '#9e9e9e', '#f44336']
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin: 10,
            filename: 'Robotec_Results.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().from(element).save();
    }
</script>
</body>
</html>
