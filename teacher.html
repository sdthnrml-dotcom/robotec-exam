<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-card { background: #1e1e1e; border-radius: 12px; padding: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3; }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; }
        .header-info h1 { margin: 5px 0 0 0; color: #fff; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { padding: 10px; border-radius: 8px; border: 2px solid #333; background: #2c2c2e; color: #fff; width: 140px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-pdf { background: #2196f3; color: white; }
        .btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        .stat-card, .chart-card, .table-card { background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .stat-card { text-align: center; }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }
        th { background: #2c2c2e; color: #ccc; }
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; color: white; }
        .btn-clear { background: #3a1c1c; color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 350px; text-align: center; border: 1px solid #333; }
        .light-print { background: white !important; color: black !important; }
        .light-print th { background: #f0f0f0 !important; color: black !important; }
        .light-print td { color: black !important; border-color: #ddd !important; }
    </style>
</head>
<body>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle" style="color:#2196f3">Notice</h3>
        <p id="modalMessage"></p>
        <input type="password" id="modalInput" class="meta-input" style="display:none; width:80%; margin-bottom:15px;" placeholder="Password">
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="btnCancel" class="btn" style="background:#444; color:#fff">Cancel</button>
            <button id="btnConfirm" class="btn btn-start">OK</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-card">
        <div class="header-info">
            <h2>Faculty Of Languages And Technology</h2>
            <h1>Robotec Teacher Dashboard</h1>
        </div>
        <div class="controls">
            <input type="text" id="branchInput" class="meta-input" placeholder="Branch Name">
            <input type="text" id="groupInput" class="meta-input" placeholder="Group No">
            <button id="toggleBtn" class="btn btn-start" onclick="toggleExam()">Loading...</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="stat-card">
                <h3>Live Students</h3>
                <span id="loginCount">0</span>
            </div>
            <div class="chart-card">
                <canvas id="gradeChart"></canvas>
            </div>
        </div>
        <div class="table-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Results</h3>
                <button class="btn-clear" onclick="clearAllData()">Clear All</button>
            </div>
            <div id="pdf-area">
                <div id="reportHeader" style="display:none; text-align:center; border-bottom:2px solid #2196f3; margin-bottom:10px;">
                    <h2 id="pdfTitle">EXAM REPORT</h2>
                    <p id="pdfMeta"></p>
                </div>
                <table id="resultsTable">
                    <thead><tr><th>ID</th><th>Name</th><th>Marks</th><th>Grade</th><th class="no-print">Action</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:093b7dbd17dfd8d092e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gradeChart = null;

    async function customBox(msg, type='alert') {
        return new Promise(res => {
            const m = document.getElementById('customModal'), t = document.getElementById('modalTitle'), 
                  p = document.getElementById('modalMessage'), i = document.getElementById('modalInput'),
                  bc = document.getElementById('btnCancel'), bk = document.getElementById('btnConfirm');
            p.innerText = msg; i.style.display = type==='password'?'block':'none';
            bc.style.display = type==='alert'?'none':'block';
            m.style.display = 'flex';
            bk.onclick = () => { m.style.display='none'; res(type==='password'?i.value:true); };
            bc.onclick = () => { m.style.display='none'; res(false); };
        });
    }

    function toggleExam() {
        db.ref('status').once('value', s => {
            const curr = s.val() || 'stopped';
            if(curr === 'stopped') {
                const b = document.getElementById('branchInput').value.trim(), g = document.getElementById('groupInput').value.trim();
                if(!b || !g) return alert("Enter Branch and Group!");
                db.ref().update({ status: 'running', branch: b, group: g, session: Date.now(), active: null });
            } else {
                db.ref('status').set('stopped');
            }
        });
    }

    async function clearAllData() {
        if(await customBox("Delete everything?", "confirm") && await customBox("Password:", "password") === "123") {
            db.ref().update({ results: null, active: null, branch: '', group: '' });
        }
    }

    db.ref().on('value', snap => {
        const data = snap.val() || {};
        const status = data.status || 'stopped';
        const btn = document.getElementById('toggleBtn');
        btn.innerText = status === 'running' ? "STOP EXAM" : "START EXAM";
        btn.className = status === 'running' ? "btn btn-stop" : "btn btn-start";
        
        document.getElementById('branchInput').value = data.branch || '';
        document.getElementById('groupInput').value = data.group || '';
        document.getElementById('loginCount').innerText = data.active ? Object.keys(data.active).length : 0;

        const results = data.results ? Object.values(data.results) : [];
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const counts = { "A+":0,"A":0,"B":0,"C":0,"S":0,"F":0,"VOID":0 };

        results.forEach(r => {
            counts[r.grade]++;
            const warn = r.violation ? '<span title="Cheat Detected">⚠️</span>' : '';
            tbody.innerHTML += `<tr><td>${r.id}</td><td>${r.name} ${warn}</td><td>${r.marks}</td>
                <td><span class="grade-pill" style="background:${getGradeColor(r.grade)}">${r.grade}</span></td>
                <td class="no-print"><button class="btn-clear" onclick="deleteRes('${r.id}')">X</button></td></tr>`;
        });
        updateChart(counts);
    });

    function getGradeColor(g) {
        return { "A+":"#4caf50","A":"#4caf50","B":"#8bc34a","C":"#ff9800","S":"#ffeb3b","F":"#f44336","VOID":"#d32f2f" }[g] || "#444";
    }

    function deleteRes(id) { db.ref('results/'+id).remove(); }

    function updateChart(c) {
        const ctx = document.getElementById('gradeChart').getContext('2d');
        if(gradeChart) gradeChart.destroy();
        gradeChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(c), datasets: [{ data: Object.values(c), backgroundColor: '#2196f3' }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    function downloadPDF() {
        const el = document.getElementById('pdf-area');
        el.classList.add('light-print');
        document.getElementById('reportHeader').style.display = 'block';
        document.getElementById('pdfMeta').innerText = `Branch: ${document.getElementById('branchInput').value} | Group: ${document.getElementById('groupInput').value}`;
        const opt = { margin: 10, filename: 'Robotec_Results.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(el).save().then(() => {
            el.classList.remove('light-print');
            document.getElementById('reportHeader').style.display = 'none';
        });
    }
</script>
</body>
</html>
