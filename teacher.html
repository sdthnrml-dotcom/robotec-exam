<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- DARK THEME BASE --- */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Cards */
        .header-card, .chart-card, .table-card, .stat-card { 
            background: #1e1e1e; border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
        }
        
        .header-card { 
            padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center;
            margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3;
        }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; font-weight: bold; line-height: 1.2; }
        .header-info h1 { margin: 5px 0 0 0; color: #ffffff; font-size: 1.4rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* Input Controls */
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { 
            padding: 10px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; 
            outline: none; width: 140px; transition: 0.2s; text-align: center; box-sizing: border-box;
            background-color: #2c2c2e; color: #fff;
        }
        .meta-input:focus { border-color: #2196f3; }
        
        /* Buttons */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-pdf { background: #2196f3; color: white; }
        .btn-pdf:hover { background: #1976d2; }
        
        /* Dashboard Layout */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; margin-bottom: 25px; }
        .left-column { display: flex; flex-direction: column; gap: 20px; }
        .chart-card, .table-card { padding: 20px; }
        
        .stat-card { text-align: center; padding: 25px 20px; }
        .stat-card h3 { margin: 0; color: #aaa; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; margin-top: 10px; line-height: 1; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; vertical-align: middle; }
        th { background-color: #2c2c2e; color: #ccc; font-weight: bold; text-align: center; }
        td { text-align: center; color: #eee; }
        td:nth-child(2) { text-align: left; } 
        tr:hover { background-color: #252525; }
        
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; color: white; display: inline-block; text-align: center; min-width: 30px; }
        
        /* Delete Button */
        .btn-clear { background: #3a1c1c; color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-clear:hover { background: #ff5252; color: white; }
        .cheat-badge { font-size: 1.2rem; margin-left: 8px; cursor: help; animation: blink 1s infinite;} 
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #pdf-content { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        h3 { color: #e0e0e0; }
        
        /* --- MODAL BOX STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box {
            background: #1e1e1e; border: 1px solid #333; border-radius: 16px; padding: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-align: center;
        }
        .modal-box h3 { margin: 0 0 15px 0; color: #2196f3; font-size: 1.5rem; }
        .modal-box p { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.4; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-actions .btn { flex: 1; }
        .btn-cancel { background: #444; color: #eee; }

        /* --- PRINT INK-SAVER MODE --- */
        .light-print { background: white !important; color: black !important; }
        .light-print th { background-color: #f8f9fa !important; color: #333 !important; border-bottom: 1px solid #ccc !important; }
        .light-print td { color: #000 !important; border-bottom: 1px solid #eee !important; }
        .light-print h3 { color: #000 !important; }
    </style>
</head>
<body>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Notice</h3>
        <p id="modalMessage">Message goes here</p>
        <input type="password" id="modalInput" class="meta-input" style="display:none; width: 100%; margin-bottom: 15px;" placeholder="Enter Password">
        <div class="modal-actions">
            <button id="btnCancel" class="btn btn-cancel">Cancel</button>
            <button id="btnConfirm" class="btn btn-start">OK</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-card">
        <div class="header-info">
            <h2>Faculty Of Languages And Technology</h2>
            <h1>Robotec Teacher Dashboard</h1>
        </div>
        <div class="controls">
            <input type="text" id="branchInput" class="meta-input" placeholder="Branch Name">
            <input type="text" id="groupInput" class="meta-input" placeholder="Group No">
            <button id="toggleBtn" class="btn btn-start" onclick="toggleExam()">Start Exam</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="stat-card">
                <h3>Submissions</h3>
                <span id="loginCount">0</span>
            </div>
            <div class="chart-card">
                <h3 style="margin-top: 0; text-align: center;">Grade Distribution</h3>
                <canvas id="gradeChart"></canvas>
            </div>
        </div>
        
        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">Student Results (Cloud Live)</h3>
                <button class="btn-clear" onclick="clearAllData()">Clear All Data</button>
            </div>
            
            <div id="pdf-content">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Marks</th>
                            <th>Grade</th>
                            <th class="no-print">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CLOUD ENGINE INTEGRATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:36e9055b16af141292e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let gradeChartInstance = null;
    const ADMIN_PASSWORD = "123";

    // Modals
    function customBox(message, type = 'alert') {
        return new Promise((resolve) => {
            const modal = document.getElementById('customModal');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const input = document.getElementById('modalInput');
            const btnCancel = document.getElementById('btnCancel');
            const btnConfirm = document.getElementById('btnConfirm');

            msg.innerText = message;
            input.value = '';
            modal.style.display = 'flex';

            if (type === 'alert') {
                title.innerText = "Notice"; title.style.color = "#2196f3";
                input.style.display = 'none'; btnCancel.style.display = 'none';
                btnConfirm.innerText = "OK"; btnConfirm.className = "btn btn-start";
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(true); };
            } 
            else if (type === 'confirm') {
                title.innerText = "Are you sure?"; title.style.color = "#f44336";
                input.style.display = 'none'; btnCancel.style.display = 'block';
                btnConfirm.innerText = "Yes, Proceed"; btnConfirm.className = "btn btn-stop";
                btnCancel.onclick = () => { modal.style.display = 'none'; resolve(false); };
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(true); };
            } 
            else if (type === 'password') {
                title.innerText = "Security Check"; title.style.color = "#ff9800";
                input.style.display = 'block'; btnCancel.style.display = 'block';
                btnConfirm.innerText = "Submit"; btnConfirm.className = "btn btn-start";
                input.focus();
                btnCancel.onclick = () => { modal.style.display = 'none'; resolve(null); };
                btnConfirm.onclick = () => { modal.style.display = 'none'; resolve(input.value); };
            }
        });
    }

    // Live listen to Status
    db.ref('status').on('value', (snap) => {
        let status = snap.val();
        let btn = document.getElementById('toggleBtn');
        if (status === 'running') {
            btn.innerText = "Stop Exam";
            btn.className = "btn btn-stop";
        } else {
            btn.innerText = "Start Exam";
            btn.className = "btn btn-start";
        }
    });

    // Live listen to Results
    db.ref('results').on('value', (snap) => {
        let data = snap.val();
        let tbody = document.getElementById('tableBody');
        let resultsArray = [];
        
        tbody.innerHTML = '';

        if(!data) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#666;">Waiting for cloud submissions...</td></tr>`;
            document.getElementById('loginCount').innerText = "0";
            updateChart([]);
            return;
        }

        for (let key in data) {
            let res = data[key];
            resultsArray.push(res);
            
            let color = "#f44336"; 
            if(res.grade === "A+" || res.grade === "A") color = "#4caf50";
            if(res.grade === "B") color = "#8bc34a";
            if(res.grade === "C") color = "#ff9800";
            if(res.grade === "S") color = "#ffeb3b";

            let cheatWarning = res.violation ? `<span class="cheat-badge" title="Security Violation!">🚨 CHEATED</span>` : '';

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${res.id}</strong></td>
                <td>${res.name} ${cheatWarning}</td>
                <td>${res.marks}</td>
                <td><span class="grade-pill" style="background:${color}; color:${res.grade==="S"||res.grade==="C"?'#333':'white'}">${res.grade}</span></td>
                <td class="no-print"><button class="btn-clear" onclick="deleteStudent('${res.id}')">X</button></td>
            `;
            tbody.appendChild(tr);
        }
        
        document.getElementById('loginCount').innerText = resultsArray.length;
        updateChart(resultsArray);
    });

    function toggleExam() {
        db.ref('status').once('value', (snap) => {
            let current = snap.val();
            if(current === 'running') {
                db.ref('status').set('stopped');
            } else {
                db.ref('status').set('running');
            }
        });
    }

    async function deleteStudent(studentId) {
        let isSure = await customBox("Delete this result from the cloud?", "confirm");
        if (isSure) {
            let pass = await customBox("Enter admin password:", "password");
            if (pass === ADMIN_PASSWORD) {
                db.ref('results/' + studentId).remove();
            } else if (pass !== null) {
                customBox("Incorrect password!", "alert");
            }
        }
    }

    async function clearAllData() {
        let isSure = await customBox("Delete ALL cloud results?", "confirm");
        if (isSure) {
            let pass = await customBox("Enter admin password:", "password");
            if (pass === ADMIN_PASSWORD) {
                db.ref('results').remove();
                customBox("Cloud database cleared.", "alert");
            } else if (pass !== null) {
                customBox("Incorrect password!", "alert");
            }
        }
    }

    function updateChart(results) {
        let counts = { "A+": 0, "A": 0, "B": 0, "C": 0, "S": 0, "F": 0, "VOID": 0 };
        results.forEach(r => { if(counts[r.grade] !== undefined) counts[r.grade]++; });

        const ctx = document.getElementById('gradeChart').getContext('2d');
        if (gradeChartInstance) gradeChartInstance.destroy();
        Chart.defaults.color = '#ccc';

        gradeChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A+', 'A', 'B', 'C', 'S', 'F', 'VOID'],
                datasets: [{
                    label: 'Students',
                    data: [counts['A+'], counts['A'], counts['B'], counts['C'], counts['S'], counts['F'], counts['VOID']],
                    backgroundColor: ['#4caf50', '#4caf50', '#8bc34a', '#ff9800', '#ffeb3b', '#f44336', '#d32f2f']
                }]
            },
            options: { responsive: true, plugins: { legend: { display:false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    function downloadPDF() {
        document.querySelectorAll('.no-print').forEach(el => el.style.display = 'none');
        let element = document.getElementById('pdf-content');
        element.classList.add('light-print');

        let opt = {
            margin: 10, filename: 'Robotec_Results.pdf', image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save().then(() => {
            document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
            element.classList.remove('light-print');
        });
    }
</script>
</body>
</html>
