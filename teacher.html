<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Robotec Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1000px; margin: 0 auto; display: none; } /* Hidden by default */
        
        /* LOGIN GATE STYLES */
        #login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 16px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        
        .header-card { background: #1e1e1e; border-radius: 12px; padding: 30px 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 25px; gap: 20px; border-top: 3px solid #2196f3; }
        .header-info h2 { margin: 0; color: #2196f3; font-size: 2rem; font-weight: bold; }
        .header-info h1 { margin: 5px 0 0 0; color: #ffffff; font-size: 1.4rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .meta-input { padding: 12px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; outline: none; width: 100%; background-color: #2c2c2e; color: #fff; text-align: center; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn:disabled { background: #444 !important; color: #888; }
        .btn-pdf { background: #2196f3; color: white; width: auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        .chart-card, .table-card, .stat-card { background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .stat-card { text-align: center; padding: 25px 20px; margin-bottom: 20px; }
        .stat-card span { color: #2196f3; font-size: 3.5rem; font-weight: bold; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        th { background-color: #2c2c2e; color: #ccc; }
        .grade-pill { padding: 4px 12px; border-radius: 20px; font-weight: bold; color: white; }
        .btn-clear { background: #3a1c1c; color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { background: #1e1e1e; border-radius: 16px; padding: 30px; width: 350px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="login-box">
        <h2 style="color:#2196f3; margin-top:0;">Teacher Login</h2>
        <p style="color:#888;">Enter password to access dashboard</p>
        <input type="password" id="gatePass" class="meta-input" placeholder="Password">
        <button onclick="unlockDashboard()" class="btn btn-start">Login</button>
        <p id="loginError" style="color:#f44336; font-size:0.9rem; margin-top:10px; display:none;">Incorrect Password!</p>
    </div>
</div>

<div id="mainUI" class="container">
    <div class="header-card">
        <div class="header-info">
            <h2>Faculty Of Languages And Technology</h2>
            <h1>Robotec Teacher Dashboard</h1>
        </div>
        <div class="controls" style="width: 100%; max-width: 600px;">
            <input type="text" id="branchInput" class="meta-input" style="width: 140px;" placeholder="Branch" oninput="checkInputs()">
            <input type="text" id="groupInput" class="meta-input" style="width: 140px;" placeholder="Group No" oninput="checkInputs()">
            <button id="toggleBtn" class="btn btn-start" style="width: 200px;" onclick="toggleExam()" disabled>Fill Details</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">PDF</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-col">
            <div class="stat-card"><h3>Live Students</h3><span id="loginCount">0</span></div>
            <div class="chart-card"><canvas id="gradeChart"></canvas></div>
        </div>
        <div class="table-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Results</h3>
                <button class="btn-clear" onclick="clearAllData()">Clear All</button>
            </div>
            <div id="pdf-content">
                <table id="resultsTable">
                    <thead><tr><th>ID</th><th>Name</th><th>Marks</th><th>Grade</th><th>Action</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Security Check</h3>
        <p id="modalMessage">Enter Password</p>
        <input type="password" id="modalInput" class="meta-input" style="width: 100%; margin-bottom: 15px;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal(false)" class="btn" style="background:#444; flex:1">Cancel</button>
            <button onclick="closeModal(true)" class="btn btn-start" style="flex:1">OK</button>
        </div>
    </div>
</div>

<script>
    // --- AUTH LOGIC ---
    function unlockDashboard() {
        const pass = document.getElementById('gatePass').value;
        if(pass === "123") {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:a1f31c88efd71ff492e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let modalResolve;
    function openModal(title, msg, showInput) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('modalInput').style.display = showInput ? 'block' : 'none';
        document.getElementById('customModal').style.display = 'flex';
        return new Promise(res => modalResolve = res);
    }
    function closeModal(val) {
        document.getElementById('customModal').style.display = 'none';
        modalResolve(val ? (document.getElementById('modalInput').value || true) : false);
    }

    function checkInputs() {
        const b = document.getElementById('branchInput').value.trim();
        const g = document.getElementById('groupInput').value.trim();
        const btn = document.getElementById('toggleBtn');
        db.ref('status').once('value', s => {
            if(s.val() !== 'running') {
                btn.disabled = !(b && g);
                btn.innerText = (b && g) ? "Start Exam" : "Fill Details";
            }
        });
    }

    function toggleExam() {
        db.ref('status').once('value', s => {
            if(s.val() === 'running') {
                db.ref('status').set('stopped');
            } else {
                const b = document.getElementById('branchInput').value;
                const g = document.getElementById('groupInput').value;
                db.ref('/').update({ status: 'running', branch: b, group: g, session: Date.now() });
            }
        });
    }

    async function clearAllData() {
        const pass = await openModal("Admin Only", "Confirm Clear Cloud Data", true);
        if(pass === "123") { db.ref('results').remove(); db.ref('active').remove(); }
    }

    db.ref().on('value', snap => {
        const data = snap.val() || {};
        const status = data.status || 'stopped';
        const btn = document.getElementById('toggleBtn');
        btn.innerText = status === 'running' ? "Stop Exam" : "Start Exam";
        btn.className = status === 'running' ? "btn btn-stop" : "btn btn-start";
        document.getElementById('branchInput').disabled = status === 'running';
        document.getElementById('groupInput').disabled = status === 'running';
        
        const results = data.results ? Object.values(data.results) : [];
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        results.forEach(r => {
            tbody.innerHTML += `<tr><td>${r.id}</td><td>${r.name} ${r.violation?'⚠️':''}</td><td>${r.marks}</td><td><span class="grade-pill" style="background:${getCol(r.grade)}">${r.grade}</span></td><td><button class="btn-clear" onclick="deleteRes('${r.id}')">X</button></td></tr>`;
        });
        document.getElementById('loginCount').innerText = data.active ? Object.keys(data.active).length : 0;
    });

    function deleteRes(id) { db.ref('results/' + id).remove(); }
    function getCol(g) { return g==='A+'||g==='A'?'#4caf50':g==='B'?'#8bc34a':g==='C'?'#ff9800':g==='S'?'#ffeb3b':'#f44336'; }
    function downloadPDF() { html2pdf().from(document.getElementById('pdf-content')).save(); }
</script>
</body>
</html>
