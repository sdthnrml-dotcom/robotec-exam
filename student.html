<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Robotec Examination</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; padding: 0; background-color: #2c2c2e; font-family: sans-serif; display: flex; justify-content: center; align-items: center; }
        .intro-card { width: 90%; max-width: 500px; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-start { width: 100%; background: #2196f3; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-start:disabled { background: #9e9e9e; cursor: not-allowed; }
        .paper-card { width: 100%; max-width: 650px; height: 95vh; background: white; border-radius: 16px; display: none; flex-direction: column; position: relative; overflow: hidden; }
        .content { flex-grow: 1; padding: 25px; overflow-y: auto; z-index: 5; }
        .footer { background: #f8f9fa; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }
        #watermark { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-txt { transform: rotate(-30deg); font-size: 1.5rem; font-weight: bold; padding: 30px; }
        textarea { width: 100%; height: 150px; border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        .opt { display: block; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; cursor: pointer; text-align: left; }
        .opt:hover { background: #f0f7ff; }
        #cheat-warning { color: #d32f2f; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="intro-card" id="intro-screen">
    <h2>Robotec Final Exam</h2>
    <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. STU-001">
    </div>
    <div class="form-group">
        <label>Name</label>
        <input type="text" id="studentName" placeholder="Full Name">
    </div>
    <label style="display:block; background:#fff3cd; padding:10px; border-radius:8px; margin-bottom:15px; font-size:0.9rem;">
        <input type="checkbox" id="consentCheck"> I agree not to take screenshots. Switch focus = Auto Submit (0 marks).
    </label>
    <button class="btn-start" id="startBtn" onclick="startExam()">WAITING FOR TEACHER...</button>
</div>

<div class="paper-card" id="exam-screen">
    <div id="watermark"></div>
    <div class="content" id="q-area"></div>
    <div class="footer">
        <button onclick="nav(-1)">Prev</button>
        <span id="progress">1/14</span>
        <button id="nextBtn" onclick="nav(1)">Next</button>
    </div>
</div>

<div class="intro-card" id="result-screen" style="display:none;">
    <h2 id="res-title">Exam Submitted</h2>
    <p id="cheat-warning">SECURITY VIOLATION DETECTED - SCORE VOIDED</p>
    <p>ID: <b id="res-id"></b></p>
    <p>Marks: <b id="res-marks"></b></p>
    <p>Grade: <b id="res-grade"></b></p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:a1f31c88efd71ff492e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let student = { id: '', name: '' }, answers = new Array(14).fill(null), current = 0, active = false;

    db.ref('status').on('value', s => {
        const running = s.val() === 'running';
        const btn = document.getElementById('startBtn');
        btn.disabled = !running;
        btn.innerText = running ? "START EXAM" : "WAITING FOR TEACHER...";
    });

    function startExam() {
        const id = document.getElementById('studentId').value.trim(), nm = document.getElementById('studentName').value.trim();
        if(!id || !nm || !document.getElementById('consentCheck').checked) return alert("Fill all details & check consent!");
        
        student = { id, name: nm };
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'flex';
        active = true;
        db.ref('active/' + id).set(true);
        render();
    }

    const examData = [
        { type: 'mcq', q: "1. රොබෝවක් (Robot) යනු කුමක්ද?", opts: ["A. සරල යන්ත්‍රයක්", "B. ස්වයංක්‍රීයව ක්‍රියා කරන යන්ත්‍රයක්", "C. පරිගණක උපකරණයක්", "D. විදුලි උපකරණයක්"], ans: 1 },
        { type: 'mcq', q: "2. “Unimate” රොබෝව සොයා ගත්තේ කවදාද?", opts: ["A. 1950", "B. 1970", "C. 1980", "D. 1990"], ans: 0 },
        { type: 'mcq', q: "3. රොබෝ විද්‍යාව යනු කුමක්ද?", opts: ["A. රොබෝවරුන් පිළිබඳ අධ්‍යයනය", "B. මෘදුකාංග අධ්‍යයනය", "C. විදුලි පරිපථ අධ්‍යයනය", "D. යන්ත්‍ර අලුත්වැඩියා කිරීම"], ans: 0 },
        { type: 'mcq', q: "4. රොබෝ තාක්ෂණය භාවිතා වන ක්ෂේත්‍රය?", opts: ["A. නිෂ්පාදන", "B. සෞඛ්‍ය", "C. පර්යේෂණ", "D. සියල්ල"], ans: 3 },
        { type: 'mcq', q: "5. කාර්මික රොබෝවරු භාවිතා කරන්නේ?", opts: ["A. ඇසුරුම් කිරීම", "B. සංගීතය", "C. වැඩසටහන් ලිවීම", "D. අන්තර්ජාලය"], ans: 0 },
        { type: 'mcq', q: "6. හියුමනොයිඩ් රොබෝ යනු?", opts: ["A. මිනිස් ශරීරයට සමාන රොබෝ", "B. රෝද සහිත රොබෝ", "C. කර්මාන්ත රොබෝ", "D. වැඩසටහනක්"], ans: 0 },
        { type: 'mcq', q: "7. කොබොට් යනු?", opts: ["A. මිනිසුන් සමඟ වැඩ කරන රොබෝ", "B. යුධ රොබෝ", "C. විනෝදාත්මක රොබෝ", "D. ජංගම රොබෝ"], ans: 0 },
        { type: 'mcq', q: "8. Arduino යනු කුමක්ද?", opts: ["A. Hardware platform", "B. OS", "C. Robot control", "D. App"], ans: 0 },
        { type: 'mcq', q: "9. Sensor එකක් භාවිතා කරන්නේ?", opts: ["A. දත්ත ලබා ගැනීමට", "B. විදුලි බලය", "C. Compile කිරීමට", "D. USB සඳහා"], ans: 0 },
        { type: 'mcq', q: "10. Arduino සඳහා භාවිතා කරන software එක?", opts: ["A. Arduino IDE", "B. Builder", "C. Simulator", "D. Editor"], ans: 0 },
        { type: 'essay', q: "11. රොබෝවරු වර්ග ලියන්න." },
        { type: 'essay', q: "12. Arduino board එකේ කොටස් 5 ක් නම් කරන්න." },
        { type: 'essay', q: "13. කේතයක් උඩුගත කිරීමේ පියවර ලියන්න." },
        { type: 'essay', q: "14. රොබෝ විද්‍යාවේ ප්‍රයෝජන ලියන්න." }
    ];

    function render() {
        const area = document.getElementById('q-area'), q = examData[current];
        document.getElementById('progress').innerText = `${current + 1}/14`;
        let html = `<h3>${q.q}</h3>`;
        if(q.type === 'mcq') {
            q.opts.forEach((o, i) => html += `<label class="opt"><input type="radio" name="q" ${answers[current]===i?'checked':''} onclick="ans(${i})"> ${o}</label>`);
        } else {
            html += `<textarea oninput="ans(this.value)">${answers[current]||''}</textarea>`;
        }
        area.innerHTML = html;
        document.getElementById('nextBtn').innerText = current === 13 ? "SUBMIT" : "Next";
        
        const wm = document.getElementById('watermark');
        wm.innerHTML = '';
        for(let i=0; i<20; i++) wm.innerHTML += `<div class="wm-txt">${student.id}</div>`;
    }

    function ans(v) { answers[current] = v; }
    function nav(d) {
        if(current + d >= 14) return submit();
        if(current + d < 0) return;
        current += d; render();
    }

    function submit(cheat=false) {
        if(!active) return; active = false;
        let score = 0;
        if(!cheat) {
            examData.forEach((q, i) => { if(q.type==='mcq' && answers[i]===q.ans) score += 7; else if(q.type==='essay' && answers[i]) score += 7; });
        }
        score = Math.min(score, 100);
        const grade = cheat ? "VOID" : (score >= 75 ? "A" : score >= 65 ? "B" : score >= 45 ? "C" : "F");
        const res = { id: student.id, name: student.name, marks: cheat ? 0 : score, grade, violation: cheat };
        
        db.ref('results/' + student.id).set(res);
        db.ref('active/' + student.id).remove();
        
        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('res-id').innerText = student.id;
        document.getElementById('res-marks').innerText = res.marks;
        document.getElementById('res-grade').innerText = grade;
        if(cheat) document.getElementById('cheat-warning').style.display = 'block';
    }

    // Screenshot / Focus Trap
    window.onblur = () => { if(active) submit(true); };
    window.onkeyup = (e) => { if(active && e.key === 'PrintScreen') submit(true); };
</script>
</body>
</html>
