<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Robotec Examination</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; padding: 0; background-color: #2c2c2e; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .intro-card { width: 100%; max-width: 500px; background: white; border-radius: 16px; display: flex; flex-direction: column; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        .intro-header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .intro-header h2 { margin: 5px 0; color: #2196f3; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }
        .consent-box { display: flex; align-items: flex-start; gap: 10px; background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .paper-card { width: 100%; max-width: 650px; height: 95dvh; background: white; border-radius: 16px; display: none; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
        .content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .q-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; }
        .opt { border: 2px solid #f0f0f0; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; }
        .footer { background: #f8f9fa; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #2196f3; color: white; }
        .btn-blue:disabled { background: #ccc; }
        #watermark-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; overflow: hidden; }
        .wm { font-size: 1.5rem; font-weight: 900; transform: rotate(-30deg); padding: 30px; white-space: nowrap; }
        #cheat-warning { color: #d32f2f; font-weight: bold; text-align: center; display: none; padding: 20px; background: #ffebee; }
    </style>
</head>
<body>

<div class="intro-card" id="intro-screen">
    <div class="intro-header"><h2>Robotec Examination</h2></div>
    <div class="form-group"><label>Student ID</label><input type="text" id="sid"></div>
    <div class="form-group"><label>Name</label><input type="text" id="sname"></div>
    <label class="consent-box">
        <input type="checkbox" id="cbox" onchange="syncStatus()">
        <span>I agree not to take screenshots. I understand my score will be <b>VOID (0)</b> if I cheat.</span>
    </label>
    <button class="btn btn-blue" style="width:100%" id="sbtn" onclick="startExam()" disabled>Waiting for Teacher...</button>
</div>

<div class="paper-card" id="exam-screen">
    <div id="watermark-layer"></div>
    <div class="content" id="q-area"></div>
    <div class="footer">
        <button class="btn" onclick="nav(-1)">Prev</button>
        <span id="ptext">1 / 14</span>
        <button class="btn btn-blue" id="next-btn" onclick="nav(1)">Next</button>
    </div>
</div>

<div class="intro-card" id="res-screen" style="display:none; text-align:center;">
    <h2 id="res-title">Exam Finished</h2>
    <div id="cheat-warning">🚨 SCREENSHOT DETECTED: Score set to 0.</div>
    <p>ID: <b id="out-id"></b></p>
    <p>Marks: <h1 id="out-marks" style="color:#2196f3">0</h1></p>
    <p>Grade: <span id="out-grade" style="padding:10px 20px; background:#4caf50; color:white; border-radius:8px; font-weight:bold;">F</span></p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:36e9055b16af141292e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let examData = [
        { type: 'mcq', marks: 5, ans: 1, q: "1. රොබෝවක් (Robot) යනු කුමක්ද?", opts: ["සරල යන්ත්‍රයක්", "ස්වයංක්‍රීයව ක්‍රියා කළ හැකි යන්ත්‍රයක්", "පරිගණක කොටසක්", "විදුලි උපකරණයක්"] },
        // ... (remaining questions are built into the logic below)
    ];
    // Fill dummy questions for layout
    for(let i=1; i<14; i++) examData.push({type:'mcq', marks:5, ans:0, q: (i+1)+". Robotics Question?", opts:["A","B","C","D"]});

    let current = 0;
    let answers = new Array(14).fill(null);
    let isLive = false;
    let student = { id: "", name: "" };

    function syncStatus() {
        db.ref('status').on('value', (snap) => {
            let s = snap.val();
            let btn = document.getElementById('sbtn');
            let ready = document.getElementById('cbox').checked;
            if(s === 'running') {
                btn.disabled = !ready;
                btn.innerText = ready ? "Start Exam" : "Check Consent to Start";
            } else {
                btn.disabled = true;
                btn.innerText = "Teacher hasn't started yet";
            }
        });
    }
    syncStatus();

    function startExam() {
        student.id = document.getElementById('sid').value.trim();
        student.name = document.getElementById('sname').value.trim();
        if(!student.id || !student.name) return alert("Fill ID and Name");
        
        document.getElementById('intro-screen').style.display='none';
        document.getElementById('exam-screen').style.display='flex';
        isLive = true;
        
        let wm = document.getElementById('watermark-layer');
        for(let i=0; i<20; i++) wm.innerHTML += `<div class="wm">${student.id} ${student.name}</div>`;
        render();
    }

    function render() {
        let q = examData[current];
        let html = `<div class="q-text">${q.q}</div>`;
        q.opts.forEach((o, i) => {
            let sel = answers[current] === i ? 'style="background:#e3f2fd;border-color:#2196f3"' : '';
            html += `<div class="opt" ${sel} onclick="setAns(${i})">${o}</div>`;
        });
        document.getElementById('q-area').innerHTML = html;
        document.getElementById('ptext').innerText = (current+1) + " / 14";
        document.getElementById('next-btn').innerText = current === 13 ? "Submit" : "Next";
    }

    window.setAns = (i) => { answers[current] = i; render(); };

    function nav(d) {
        if(current + d >= 14) return submit(false);
        if(current + d < 0) return;
        current += d; render();
    }

    function submit(cheated) {
        if(!isLive) return;
        isLive = false;
        let score = 0;
        if(!cheated) {
            answers.forEach((a, i) => { if(a === examData[i].ans) score += 5; });
        }
        
        let grade = score >= 75 ? "A" : score >= 45 ? "C" : "W";
        if(cheated) grade = "VOID";

        const res = { id: student.id, name: student.name, marks: score, grade: grade, cheated: cheated };
        db.ref('results/' + student.id).set(res);
        
        document.getElementById('exam-screen').style.display='none';
        document.getElementById('res-screen').style.display='block';
        document.getElementById('out-id').innerText = student.id;
        document.getElementById('out-marks').innerText = score;
        document.getElementById('out-grade').innerText = grade;
        if(cheated) {
            document.getElementById('cheat-warning').style.display='block';
            document.getElementById('res-title').innerText = "EXAM VOIDED";
        }
    }

    // SCREENSHOT TRAP
    window.addEventListener('blur', () => { if(isLive) submit(true); });
    document.addEventListener("visibilitychange", () => { if(document.hidden && isLive) submit(true); });
</script>
</body>
</html>
