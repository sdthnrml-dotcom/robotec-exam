<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Robotec Exam - Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* [Keeping your original Student CSS for familiarity] */
        body, html { height: 100%; margin: 0; background-color: #2c2c2e; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; }
        .card { width: 90%; max-width: 500px; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #2196f3; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #999; }
        .consent { background: #fff3cd; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin: 15px 0; display: flex; gap: 10px; text-align: left; }
        #exam-screen { display: none; background: white; width: 100%; height: 100vh; flex-direction: column; }
        .q-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .watermark { position: absolute; top:0; left:0; width: 100%; height: 100%; opacity: 0.05; pointer-events: none; font-size: 2rem; transform: rotate(-30deg); display: flex; flex-wrap: wrap; gap: 50px; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="card" id="login-screen">
    <h2 style="color:#2196f3">Robotec Cloud Exam</h2>
    <input type="text" id="sId" placeholder="Student ID">
    <input type="text" id="sName" placeholder="Full Name">
    <label class="consent">
        <input type="checkbox" id="cBox" onchange="checkStatus()">
        <span>I agree to the security rules. <b>Screenshots will result in 0 marks.</b></span>
    </label>
    <button id="startBtn" class="btn" onclick="start()" disabled>Waiting for Teacher...</button>
</div>

<div id="exam-screen">
    <div id="wm" class="watermark"></div>
    <div class="q-area" id="qArea">
        <h2 id="qText"></h2>
        <div id="opts"></div>
    </div>
    <div style="padding: 20px; display:flex; gap:10px; background: #f8f9fa;">
        <button class="btn" onclick="nav(-1)">Prev</button>
        <button class="btn" id="nextBtn" onclick="nav(1)">Next</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0esujLjeIGinGEAnvJ7FXk6pR-fPKftU",
        authDomain: "robotec-exam.firebaseapp.com",
        databaseURL: "https://robotec-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robotec-exam",
        storageBucket: "robotec-exam.firebasestorage.app",
        messagingSenderId: "917109694961",
        appId: "1:917109694961:web:a1f31c88efd71ff492e450"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cur = 0;
    let answers = [];
    let isActive = false;
    let student = {};

    function checkStatus() {
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const btn = document.getElementById('startBtn');
            const box = document.getElementById('cBox').checked;
            if(data.status === 'running' && box) {
                btn.disabled = false; btn.innerText = "Start Exam";
            } else {
                btn.disabled = true; btn.innerText = data.status === 'running' ? "Check Consent" : "Waiting for Teacher...";
            }
            if(isActive && data.status !== 'running') submit(false);
        });
    }
    checkStatus();

    function start() {
        student.id = document.getElementById('sId').value;
        student.name = document.getElementById('sName').value;
        if(!student.id || !student.name) return alert("Fill details!");
        
        isActive = true;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'flex';
        db.ref('active/' + student.id).set(true);
        
        // Setup Watermark
        for(let i=0; i<20; i++) document.getElementById('wm').innerHTML += `<div>${student.id}</div>`;
        render();
    }

    // Questions (Shortened for code display, use your full 14 questions here)
    const questions = [
        {q: "What is a Robot?", opts: ["Machine", "Fruit", "Animal"], a: 0},
        // ... Add all 14 questions here ...
    ];

    function render() {
        const q = questions[cur];
        document.getElementById('qText').innerText = q.q;
        document.getElementById('opts').innerHTML = q.opts.map((o, i) => `<button class="btn" style="background:#fff; color:#333; border:1px solid #ddd" onclick="answers[${cur}]=${i}; render();">${answers[cur]===i?'✅ ':''}${o}</button>`).join('');
        document.getElementById('nextBtn').innerText = cur === questions.length -1 ? "Submit" : "Next";
    }

    function nav(d) {
        if(cur + d >= questions.length) return submit(false);
        if(cur + d < 0) return;
        cur += d; render();
    }

    function submit(violation) {
        if(!isActive) return;
        isActive = false;
        let marks = 0;
        if(!violation) {
            questions.forEach((q, i) => { if(answers[i] === q.a) marks += 5; });
        }
        const grade = marks >= 75 ? 'A' : marks >= 45 ? 'C' : 'F';
        db.ref('results/' + student.id).set({
            id: student.id, name: student.name, marks: violation ? 0 : marks, grade: violation ? 'VOID' : grade, violation: violation
        });
        db.ref('active/' + student.id).remove();
        alert(violation ? "SECURITY VIOLATION: Score 0" : "Submitted Successfully!");
        location.reload();
    }

    // Anti-Cheat
    window.onblur = () => { if(isActive) submit(true); };
    window.onkeyup = (e) => { if(e.key === 'PrintScreen' && isActive) submit(true); };
</script>
</body>
</html>
